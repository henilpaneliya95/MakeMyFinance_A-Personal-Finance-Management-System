services:
  - type: web
    name: makemyfinance-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn item_service.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SETTINGS_MODULE
        value: item_service.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com,www.makemyfinance.online,makemyfinance.online
      - key: CORS_ALLOWED_ORIGINS
        value: https://www.makemyfinance.online,https://makemyfinance.online
      - key: CSRF_TRUSTED_ORIGINS
        value: https://www.makemyfinance.online,https://makemyfinance.online
      - key: EMAIL_TIMEOUT
        value: "8"
      - key: AUTH_REQUIRE_LOGIN_OTP
        value: "True"
      - key: AUTH_ALLOW_OTP_PREVIEW
        value: "True"
